packages:
  - name: docker
    type: docker
    argdeps:
      - imageRepoBase
      - codeWebExtensionCommit
    config:
      dockerfile: blazedock.Dockerfile
      metadata:
        helm-component: workspace.codeWebExtensionImage
      buildArgs:
        CODE_EXTENSION_COMMIT: ${codeWebExtensionCommit}
      image:
        - ${imageRepoBase}/ide/khulnasoft-code-web:${version}
        - ${imageRepoBase}/ide/khulnasoft-code-web:commit-${__git_commit}
